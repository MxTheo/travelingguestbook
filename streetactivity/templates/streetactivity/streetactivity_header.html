<header class="mb-5">
    <div class="row align-items-center">
        <div class="col-md-8">
            <h1 class="text-success-emphasis mb-3">{{ activity.name }}</h1>
            <p class="lead text-muted mb-4">"{{ activity.question }}"</p>
        </div>
        <div class="col-md-4">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h5 class="card-title mb-3">
                        Eén woord. Wat past bij dit spel vandaag?
                    </h5>
                    <div class="d-grid gap-2">
                        <a href="{% url 'create-word' activity.pk %}"
                            class="btn btn-light btn-lg">
                            <i class="bi bi-droplet me-2 fs-6"></i>Plant je woord
                        </a>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
